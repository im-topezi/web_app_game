<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="/static/game.css">
        <title>
            Welcome to game
        </title>
        
    </head>
    <body>
        {%if previous_page%}
        <a href="{{previous_page}}">&lt;&lt;</a>
        {%else%}
        <a href="/">&lt;&lt;</a>
        {%endif%}
        {% for message in get_flashed_messages() %}
        <p>
            <b>{{ message }}</b>
        </p>
        {% endfor %}

        
        {% for item in items %}
                <div>
                    <form action="/drop" method="post" >
                        <b>{{ item.item_name }}</b>
                        <input type="hidden" name="item_id" value="{{item.id}}"/>
                        <input type="submit" value="drop" onclick="return confirm('You will lose this item forever, are you sure?')" />
                    </form>
                    <form action="/sell" method="get">
                        <input type="hidden" name="item_id" value="{{item.id}}"/>
                        <input type="submit" value="sell"/>
                    </form>
                </div>
        {% endfor %}
    </body>
</html>
