<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="/static/game.css">
        <title>
            Welcome to game
        </title>
    </head>
    <body>
        {% for message in get_flashed_messages() %}
        <p>
            <b>{{ message }}</b>
        </p>
        {% endfor %}
        <div class="inventory">
            <a href="/inventory">Inventory</a>
        </div>
        
        {% for item in items %}
                <p>
                    <form action="/drop" method="post" >
                        <b>{{ item.item_name }}</b>
                        <input type="hidden" name="item_id" value="{{item.id}}"/>
                        <input type="submit" value="drop" onclick="return confirm('You will lose this item forever, are you sure?')" />
                    </form>
                </p>
        {% endfor %}
    </body>
</html>
