{% extends "layout.html" %}
    
{% block title %}Login{% endblock %}
        
{% block content %}
<a href="/">&lt;&lt;</a>
<div class="how">
<h2>Login</h2>
    <form action="/login" method="post">
        <input type="text" name="username" value="{{ username }}" placeholder="username" maxlength="10"/>
        <input type="password" name="password" placeholder="password" maxlength="20" minlength="5"/>
        <input type="submit" value="Login"/>
    </form>
</div>
{% endblock %}
